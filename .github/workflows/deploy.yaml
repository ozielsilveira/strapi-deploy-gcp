name: CI/CD Deploy

on:
  push:
    branches: [develop]

jobs:
  build-strapi:
    name: Build Strapi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache pnpm modules
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Strapi
        run: pnpm build

  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-strapi
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/strapi-a3:latest
          docker build --cache-from "$IMAGE_NAME" -t "$IMAGE_NAME" .
          docker push "$IMAGE_NAME"

  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.27.0"

      - name: Install gke-gcloud-auth-plugin
        run: |
          sudo apt-get install -y apt-transport-https ca-certificates curl
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list > /dev/null
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      - name: Authenticate to GKE
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --zone ${{ secrets.GKE_CLUSTER_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Create PersistentVolumeClaim
        run: |
          kubectl apply -f k8s/pvc.yaml

      - name: Deploy via envsubst
        run: |
          # Exporta a variável de imagem a partir do secret
          export DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/strapi-a3:latest"
          # Substitui ${DOCKER_IMAGE} em k8s/deployment.yaml e aplica
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          # Aplica o service
          kubectl apply -f k8s/service.yaml
          # Reinicia o deployment para garantir rollout
          kubectl rollout restart deployment/strapi-app

      - name: Wait for deployment to be ready
        run: |
          kubectl rollout status deployment/strapi-app --timeout=300s
          kubectl get pods -l app=strapi-app -o wide
